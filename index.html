<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F1E6D2" />
    <title>Identity Board · Vision Board</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fraunces + Manrope are loaded dynamically from SharedStyles so we
         don't block first paint on fonts the Family Board doesn't need. -->

    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
      }
      html,
      body {
        min-height: 100%;
        background: #F1E6D2;
      }
      body {
        font-family: 'Manrope', 'Palatino Linotype', Palatino, 'Cormorant Garamond',
          'Book Antiqua', Georgia, serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      /* Kill tap-highlight for the fridge/touch use case */
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
